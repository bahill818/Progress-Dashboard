name: Update Dashboard Data

on:
  schedule:
    - cron: '0 16,19,3 * * *'  # 10am, 1pm, 9pm CST (UTC-6)
  workflow_dispatch:             # allow manual runs

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth

      - name: Fetch CSV and update dashboard
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/update_dashboard.py

      - name: Commit and push if data changed
        if: env.DATA_CHANGED == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add body-composition-dashboard_2.html
          git commit -m "chore: update data (${{ env.ROW_COUNT }} rows, latest ${{ env.LATEST_DATE }})"
          git push
